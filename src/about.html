<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>About | PageFlick Demo</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
      }
      nav {
        position: fixed;
        top: 0;
        width: 100%;
        display: flex;
        gap: 1rem;
        padding: 1rem 2rem;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        z-index: 100;
        border-bottom: 1px solid #eee;
      }
      nav a {
        text-decoration: none;
        color: #333;
        font-weight: 500;
      }
      nav a:hover {
        color: #000;
      }
      route[scroll] {
        display: block;
      }
      section {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 6rem 2rem 2rem;
        gap: 1rem;
      }
      section h1 {
        font-size: 3rem;
      }
      section p {
        font-size: 1.25rem;
        color: #555;
        max-width: 600px;
        text-align: center;
      }
      #hero {
        background: #f0f4ff;
      }
      #features {
        background: #f0fff4;
      }
      #pricing {
        background: #fff0f4;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/">Home</a>
      <a href="/features">Features</a>
      <a href="/pricing">Pricing</a>
      <a href="/about.html">About (regular route)</a>
    </nav>
    <section id="about">
      <h1>About</h1>
      <p>This is the about page.</p>
      <a href="/">Back to home ↑</a>
    </section>
    <script type="module">
      import { startRouter } from "./router.js";
      startRouter({
        onRouteChange: path => console.log("Route:", path),
      });
    </script>
  </body>
</html>
